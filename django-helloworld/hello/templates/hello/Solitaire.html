{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Solitaire Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}?v=2"> 
</head>
<body>
    <div class="page-header">
        <h1>Welcome to Polymorphic Solitaire!</h1>
        <a href="{% url 'index' %}" class="btn btn-secondary mb-3">Back to Home</a>
    </div>
    
    {% if user.is_authenticated %}
        <h2>Welcome back, {{ user.username }}!</h2>
        <p>Ready to play?</p>
        <div class="d-flex gap-2 mb-3">
            <a href="{% url 'index' %}" class="btn btn-secondary">Back Home</a>
            <a href="{% url 'hello' %}" class="btn btn-primary">New Game</a>
            <a href="{% url 'logout' %}" class="btn btn-danger">Log Out</a>
        </div>

        <hr>
        {% include 'hello/game.html' %} 

    {% else %}
        <p>You are not logged in.</p>
        <p>
            <a href="{% url 'login' %}">Log In</a> | 
            <a href="{% url 'register' %}">Register</a>
        </p>
    {% endif %}

    <script src="{% static 'solitaire.js' %}?v=2"></script>
</body>
</html>
