<!DOCTYPE html>
<html lang="English">
<head>
    <title>Login - Solitaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        body {
            background: #4F5357;
        }

        .login-box {
            background: ghostwhite;
            padding: 20px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px #27282B;
            text-align: center;
            width: 30%;
            margin: auto;
            color: black;
            align-content: center;
            align-items: center;
            justify-content: center;
            display: flow-root;
        }

        .logo-md {
            margin-top: 100px;
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
        }

        img {
            align-content: center;
        }

        .form-control {
            margin-top: 10px;
            margin-bottom: 40px;
        }

        .register_msg {
            margin-top: 50px;
        }

        .login-form {
            width: 60%;
            justify-self: center;
        }

    </style>
</head>
<body>
    <div class="logo-md">
        {%  load static %}
        <img src="{% static 'tempLogo.jpg' %}" class="img-fluid">
    </div>
    <div class="login-box">
        <h2>Login</h2>
        <div class="login-form">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary btn-lg">Login</button>
            </form>
        </div>
        <div class="register_msg">
            <p>Don't have an account? <a href="{% url 'register' %}">Register here</a>.</p>
        </div>
    </div>
</body>
</html>
