{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        body {
            background: linear-gradient(to bottom,#4F5357 30%, #5C6570 100% );
            height: 100vh;
        }

        nav {
            color: #27282B;
        }

        .tic_tac_toe_box {
            width: 250px;
            aspect-ratio: 1 / 1;
            border: solid 2px #EBEDED;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8em;
            color: #EBEDED;
        }

        .tic_tac_toe_grid {
            padding-top: 50px;
            width: 750px; /* Done to reserve the size of the grid */
        }

        .test {
            display: flex;
            justify-content: center;
        }

        .announcement {
            display: flex;
            justify-content: center;
            font-size: 4em;
            height: 100px;
            color: #EBEDED;
        }

        .option-buttons {
            display: flex;
            justify-content: center;
        }


    </style>
    <link rel="stylesheet" href="{% static 'style.css' %}?v=2">
</head>
<body>
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
        </div>
    </nav>

    <div class="game-page-title">
        <h1>Tic-Tac-Toe</h1>
    </div>

    <div class="test">
        <div class="tic_tac_toe_grid">
            <div class="row">
                <div class="tic_tac_toe_box col" data-index="1"></div>
                <div class="tic_tac_toe_box col" data-index="2"></div>
                <div class="tic_tac_toe_box col" data-index="3"></div>
            </div>
            <div class="row">
                <div class="tic_tac_toe_box col" data-index="4"></div>
                <div class="tic_tac_toe_box col" data-index="5"></div>
                <div class="tic_tac_toe_box col" data-index="6"></div>
            </div>
            <div class="row">
                <div class="tic_tac_toe_box col" data-index="7"></div>
                <div class="tic_tac_toe_box col" data-index="8"></div>
                <div class="tic_tac_toe_box col" data-index="9"></div>
            </div>
        </div>
    </div>
    <div id="announcement" class="announcement"></div>
    <div class="option-buttons">
        <button type="button" id="reset_button" class="btn btn-primary btn-lg">Reset</button>
    </div>
    <script src ="{% static 'tic_tac_toe.js' %}"></script>

</body>
</html>
