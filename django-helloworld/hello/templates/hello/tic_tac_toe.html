{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        nav {
            color: #27282B;
        }

        .tic_tac_toe_box {
            max-width: 300px;
            min-width: 100px;
            aspect-ratio: 1 / 1;
            border: solid 2px grey;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8em;
        }

        .tic_tac_toe_grid {
            padding-top: 100px;
            width: 900px; /* Done to reserve the size of the grid */
        }

        .test {
            display: flex;
            justify-content: center;
        }


    </style>
</head>
<body>
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
        </div>
    </nav>
    <div class="test">
        <div class="tic_tac_toe_grid">
            <div class="row">
                <div class="tic_tac_toe_box col" data-index="1">

                </div>
                <div class="tic_tac_toe_box col" data-index="2">

                </div>
                <div class="tic_tac_toe_box col" data-index="3">

                </div>
            </div>
            <div class="row">
                <div class="tic_tac_toe_box col" data-index="4">

                </div>
                <div class="tic_tac_toe_box col" data-index="5">

                </div>
                <div class="tic_tac_toe_box col" data-index="6">

                </div>
            </div>
            <div class="row">
                <div class="tic_tac_toe_box col" data-index="7">

                </div>
                <div class="tic_tac_toe_box col" data-index="8">

                </div>
                <div class="tic_tac_toe_box col" data-index="9">

                </div>
            </div>
        </div>
    </div>
    <script src ="{% static 'tic_tac_toe.js' %}"></script>
</body>
</html>
