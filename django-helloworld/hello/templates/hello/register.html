<!DOCTYPE html>
<html lang="English">
<head>
    <title>Register - Solitaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #4F5357;
        }

        .register-box {
            background: ghostwhite;
            padding: 20px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px #27282B;
            width: 90%;
            margin: auto;
            color: black;
        }

        .login-msg {
            margin-top: 50px;
        }

        .logo-md {
            margin-left: 5%;
            margin-top: 50px;
            margin-bottom: 50px;
            display: flex;
            justify-content: left;
        }

        img {
            width: 5%;
        }

        h2 {
            margin-left: 10%;
        }

        button {
            margin-top: 80px;
        }

    </style>
</head>
<body>
    <div class="logo-md">
        {%  load static %}
        <img src="{% static 'tempLogo.jpg' %}" class="img-fluid">
    </div>
    <div class="register-box">
    <h2>Create an Account</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-lg">Register</button>
        </form>
        <div class="login-msg">
            <p>Already have an account? <a href="{% url 'login' %}">Log in here</a>.</p>
        </div>
    </div>
</body>
</html>
