<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Directory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        body {
            background: linear-gradient(to bottom,#4F5357 30%, #5C6570 100% );
            height: 100vh;
        }

        .directory_title{
            display: inline-block;
            width: 100%;
            align-content: center;
            text-align: center;
            padding-top: 20px;
            color: #EBEDED;
        }

        .game-thumbnail {
            display: inline-block;
            aspect-ratio: 2 / 1; /* Thumbnails should be 2000px wide by 1000px tall */
            width: 90%; /* Takes up 90% of the width of the select container */
            height: auto;
            align-content: center;
            align-items: center;
            margin: 20px auto;
        }

        .Game_Select_Container {
            display: -ms-flexbox;
            background: #414447;
            width: 20%;
            text-align: center;
            margin: 20px 30px;
            box-shadow: 0 4px 10px #27282B;
        }

        .Game_Select_Container .btn {
            display: inline-block;
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    {%  load static %}
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
        </div>
    </nav>
    <div class="directory_title">
        <h1>Game Select</h1>
    </div>
    <div class ="row"> <!-- Each Column will be populated with four games as more are added-->
        <div class="Game_Select_Container col">
            <img src="{% static 'Tic-tac-toe-thumbnail.png' %}" class="game-thumbnail">
            <a href="{% url 'tic_tac_toe'%}">
                <button type="button" class="btn btn-secondary">Play Tic-Tac-Toe</button>
            </a>
        </div>
        <div class="Game_Select_Container col">
            <img src="{% static 'Solitaire-Thumbnail.png' %}" class="game-thumbnail">
            <a href="{% url 'hello'%}">
                <button type="button" class="btn btn-secondary">Go to Polymorphic Solitaire</button>
            </a>
        </div>
        <div class="Game_Select_Container col">

        </div>
        <div class="Game_Select_Container col">

        </div>
    </div>
</body>
</html>
